name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ionrusu114/portfolio-front

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_APP_GEMINI_API_KEY=${{ secrets.VITE_APP_GEMINI_API_KEY }}
            VITE_APP_GAS_WEBHOOK_URL=${{ secrets.VITE_APP_GAS_WEBHOOK_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Watchtower on server auto-pulls new images every 60s
